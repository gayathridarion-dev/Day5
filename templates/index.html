<!DOCTYPE html>
<html>
<head>
    <title>Chatbot Song Recommender</title>
</head>
<body>
    <h1>Chatbot Song Recommender</h1>
    <form method="POST">
        <input type="text" name="user_input" placeholder="How are you feeling?" required>
        <button type="submit">Get Song</button>
    </form>
    {% if song %}
    <h2>Recommended Song: {{ song }}</h2>
    {% endif %}
</body>
</html>
